plugins {
    id 'java'
    id 'io.qameta.allure' version '3.1.0'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation("org.seleniumhq.selenium:selenium-java:4.41.0")
    implementation("io.github.bonigarcia:webdrivermanager:6.3.4")
    testImplementation("io.qameta.allure:allure-junit5:2.33.0")
    implementation("org.projectlombok:lombok:1.18.44")
    testAnnotationProcessor "org.projectlombok:lombok:1.18.44"
}

allure {
    version = '2.33.0'

    adapter {
        aspectjWeaver = true
        autoconfigureListeners = true
        frameworks {
            junit5 {
                enabled = true
            }
        }
    }
}

test {
    useJUnitPlatform()
}
